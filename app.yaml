command: ["uv", "run", "custom-mcp-server"]
env:
  # ---- Lakebase target (edit for your environment) ----
  - name: LAKEBASE_HOST
    value: "<your-instance>.database.<region>.cloud.databricks.com"
  - name: LAKEBASE_DATABASE
    value: "agent_memory"
  - name: LAKEBASE_PORT
    value: "5432"
  - name: LAKEBASE_INSTANCE_NAME
    value: "<your-instance-name>"
  # ---- Model endpoints (these defaults work in any workspace with FMAPI) ----
  - name: LLM_ENDPOINT
    value: "databricks-claude-sonnet-4-6"
  - name: EMBEDDING_ENDPOINT
    value: "databricks-gte-large-en"
